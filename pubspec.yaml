name: remote_desktop_app
description: 跨平台远程桌面应用，支持 iOS 和 Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # 网络/连接
  dartssh2: ^2.9.0              # SSH 隧道 + SFTP
  web_socket_channel: ^3.0.1   # WebSocket
  http: ^1.2.2

  # 状态管理
  provider: ^6.1.2
  shared_preferences: ^2.3.3

  # 安全存储
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0            # 指纹/FaceID

  # UI 组件
  flutter_slidable: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
