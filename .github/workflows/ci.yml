name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: 构建 Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 检查 Dart 编译错误
        run: flutter build apk --debug 2>&1; echo "EXIT_CODE=$?"

      - name: 查找产物
        if: always()
        run: find build -name "*.apk" 2>/dev/null || echo "无APK文件"

      - name: 复制并上传 APK
        if: success()
        run: |
          mkdir -p release-apk
          APK=$(find build -name "*.apk" | head -1)
          cp "$APK" "release-apk/RemoteDesktop-debug.apk"

      - name: 上传 APK（Artifact）
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release-apk/*.apk
          retention-days: 30

      - name: 发布到 GitHub Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            🤖 自动构建 APK
            **提交**: ${{ github.sha }}
            ### 安装方式
            1. 下载下方 APK 文件
            2. 手机开启「允许安装未知来源应用」
            3. 点击 APK 安装
          files: release-apk/*.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
