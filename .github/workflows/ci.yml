name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 代码检查 ──────────────────────────────────────
  analyze:
    name: 代码分析
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 代码格式检查
        run: dart format --output=none --set-exit-if-changed .

      - name: 静态分析
        run: flutter analyze

  # ── 单元测试 ──────────────────────────────────────
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 运行测试
        run: flutter test --coverage

      - name: 上传覆盖率
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
        continue-on-error: true

  # ── 构建 Android ──────────────────────────────────
  build-android:
    name: 构建 Android APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 APK (debug)
        run: flutter build apk --debug

      - name: 构建 APK (release)
        run: flutter build apk --release --no-shrink
        continue-on-error: true

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ── 构建 iOS ──────────────────────────────────────
  build-ios:
    name: 构建 iOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 安装 CocoaPods
        run: |
          cd ios
          pod install --repo-update
        continue-on-error: true

      - name: 构建 iOS (no-codesign)
        run: flutter build ios --release --no-codesign

      - name: 上传 iOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

  # ── 发布 Release ──────────────────────────────────
  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: [ build-android, build-ios ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 下载 Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*.apk
          generate_release_notes: true
